name: API Pytest CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "explore/api-test-pytest/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: explore/api-test-pytest/scripts/templates/pytest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: pytest -q --junitxml=pytest-report.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: explore/api-test-pytest/scripts/templates/pytest/pytest-report.xml
