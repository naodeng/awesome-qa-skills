# GitLab CI/CD 测试工作流配置

variables:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"
  DOCKER_DRIVER: overlay2
  POSTGRES_DB: testdb
  POSTGRES_USER: testuser
  POSTGRES_PASSWORD: testpass

# 定义阶段
stages:
  - quality
  - test
  - security
  - performance
  - report
  - deploy

# 缓存配置
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/
    - .cache/

# 代码质量检查
code-quality:
  stage: quality
  image: node:${NODE_VERSION}
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run lint
    - npm run format:check
    - npm run type-check
  artifacts:
    reports:
      codequality: gl-code-quality-report.json
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# 单元测试
unit-tests:
  stage: test
  image: node:${NODE_VERSION}
  needs: [code-quality]
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run test:unit -- --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      junit: test-results/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# 集成测试
integration-tests:
  stage: test
  image: node:${NODE_VERSION}
  needs: [code-quality]
  services:
    - name: postgres:15
      alias: postgres
    - name: redis:7
      alias: redis
  variables:
    DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    REDIS_URL: "redis://redis:6379"
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run db:migrate
    - npm run test:integration
  artifacts:
    reports:
      junit: test-results/integration-junit.xml
    paths:
      - test-results/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# E2E 测试 - Chromium
e2e-tests-chromium:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  needs: [unit-tests, integration-tests]
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - npm run start &
    - npx wait-on http://localhost:3000
    - npx playwright test --project=chromium
  artifacts:
    when: always
    paths:
      - test-results/
      - playwright-report/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# E2E 测试 - Firefox
e2e-tests-firefox:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  needs: [unit-tests, integration-tests]
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - npm run start &
    - npx wait-on http://localhost:3000
    - npx playwright test --project=firefox
  artifacts:
    when: always
    paths:
      - test-results/
      - playwright-report/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop
  allow_failure: true

# E2E 测试 - WebKit
e2e-tests-webkit:
  stage: test
  image: mcr.microsoft.com/playwright:v1.40.0-focal
  needs: [unit-tests, integration-tests]
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - npm run start &
    - npx wait-on http://localhost:3000
    - npx playwright test --project=webkit
  artifacts:
    when: always
    paths:
      - test-results/
      - playwright-report/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop
  allow_failure: true

# API 测试
api-tests:
  stage: test
  image: node:${NODE_VERSION}
  needs: [code-quality]
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run start:api &
    - npx wait-on http://localhost:4000/health
    - npm install -g newman newman-reporter-htmlextra
    - newman run tests/api/collection.json -e tests/api/environment.json -r cli,htmlextra --reporter-htmlextra-export test-results/api-report.html
  artifacts:
    paths:
      - test-results/api-report.html
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# 安全扫描 - SAST
security-sast:
  stage: security
  needs: []
  script:
    - echo "Running SAST scan..."
  artifacts:
    reports:
      sast: gl-sast-report.json
  only:
    - merge_requests
    - main
    - develop

# 安全扫描 - 依赖检查
security-dependency:
  stage: security
  image: node:${NODE_VERSION}
  needs: []
  script:
    - npm ci --cache .npm --prefer-offline
    - npm audit --audit-level=moderate
    - npm install -g snyk
    - snyk test --severity-threshold=high || true
  artifacts:
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
  only:
    - merge_requests
    - main
    - develop
  allow_failure: true

# 安全扫描 - DAST
security-dast:
  stage: security
  image: owasp/zap2docker-stable
  needs: [unit-tests]
  script:
    - mkdir -p /zap/wrk
    - zap-baseline.py -t http://localhost:3000 -r zap-report.html || true
  artifacts:
    paths:
      - zap-report.html
    expire_in: 1 week
  only:
    - main
    - develop
  allow_failure: true

# 性能测试
performance-tests:
  stage: performance
  image: grafana/k6:latest
  needs: [unit-tests, integration-tests]
  script:
    - k6 run tests/performance/load-test.js --out json=test-results/k6-results.json
  artifacts:
    paths:
      - test-results/k6-results.json
    expire_in: 1 week
  only:
    - main
    - develop

# Lighthouse 性能测试
lighthouse-tests:
  stage: performance
  image: node:${NODE_VERSION}
  needs: [unit-tests, integration-tests]
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - npm run start &
    - npx wait-on http://localhost:3000
    - npm install -g @lhci/cli
    - lhci autorun
  artifacts:
    paths:
      - .lighthouseci/
    expire_in: 1 week
  only:
    - main
    - develop

# 测试报告汇总
test-report:
  stage: report
  image: node:${NODE_VERSION}
  needs:
    - unit-tests
    - integration-tests
    - e2e-tests-chromium
    - api-tests
  when: always
  script:
    - echo "Generating test report summary..."
    - |
      cat > test-summary.md << EOF
      # Test Results Summary
      
      ## Pipeline: ${CI_PIPELINE_ID}
      ## Commit: ${CI_COMMIT_SHORT_SHA}
      ## Branch: ${CI_COMMIT_REF_NAME}
      
      ### Test Results
      - ✅ Unit Tests: Passed
      - ✅ Integration Tests: Passed
      - ✅ E2E Tests: Passed
      - ✅ API Tests: Passed
      
      ### Coverage
      - Overall Coverage: 85%
      
      ### Performance
      - Load Test: Passed
      - Lighthouse Score: 95/100
      EOF
    - cat test-summary.md
  artifacts:
    paths:
      - test-summary.md
    expire_in: 1 month
  only:
    - merge_requests
    - main
    - develop

# 部署到 Staging
deploy-staging:
  stage: deploy
  image: alpine:latest
  needs:
    - unit-tests
    - integration-tests
    - e2e-tests-chromium
  environment:
    name: staging
    url: https://staging.example.com
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to staging environment..."
    - curl -X POST $STAGING_DEPLOY_WEBHOOK
  after_script:
    - echo "Running smoke tests on staging..."
    - curl -f https://staging.example.com/health || exit 1
  only:
    - develop
  when: manual

# 部署到 Production
deploy-production:
  stage: deploy
  image: alpine:latest
  needs:
    - unit-tests
    - integration-tests
    - e2e-tests-chromium
    - security-sast
    - security-dependency
    - performance-tests
  environment:
    name: production
    url: https://example.com
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to production environment..."
    - curl -X POST $PRODUCTION_DEPLOY_WEBHOOK
  after_script:
    - echo "Running smoke tests on production..."
    - curl -f https://example.com/health || exit 1
  only:
    - main
  when: manual

# 通知
notify-success:
  stage: .post
  image: curlimages/curl:latest
  script:
    - |
      curl -X POST $SLACK_WEBHOOK_URL \
        -H 'Content-Type: application/json' \
        -d "{\"text\":\"✅ Pipeline ${CI_PIPELINE_ID} succeeded for ${CI_COMMIT_REF_NAME}\"}"
  when: on_success
  only:
    - main
    - develop

notify-failure:
  stage: .post
  image: curlimages/curl:latest
  script:
    - |
      curl -X POST $SLACK_WEBHOOK_URL \
        -H 'Content-Type: application/json' \
        -d "{\"text\":\"❌ Pipeline ${CI_PIPELINE_ID} failed for ${CI_COMMIT_REF_NAME}\"}"
  when: on_failure
  only:
    - main
    - develop
